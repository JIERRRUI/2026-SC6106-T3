<head>
    <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
    <link rel = "stylesheet" href = "{{url_for('static', filename = 'styles.css')}}">
</head>

<body>
    <div class = "container">
        <h2>Deposit Money</h2>
        <input type = "text" id = "recieverAddress" placeholder="Enter Reciever Address">
        <input type = "text" id = "amount" placeholder="Enter Amount">

        <button class = "btn" onclick = "deposit()">Deposit</button>
        <button class = "btn" onclick = "transaction()">View Transaction</button>

        <form action = "/main" method = "post">
            <input type = "submit" value = "Main">
        </form>

        <p id="view_payee"></p>
        <p id="view_amount"></p>

        <script src = "https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
            const contractAddress = "0x726e340818c591378e94d18dd2f87dcb3818a81d";
            const contractABI = [
                    {
                        "inputs": [
                            {
                                "internalType": "address",
                                "name": "_payee",
                                "type": "address"
                            },
                            {
                                "internalType": "uint256",
                                "name": "_amount",
                                "type": "uint256"
                            }
                        ],
                        "name": "deposit",
                        "outputs": [],
                        "stateMutability": "payable",
                        "type": "function"
                    },
                    {
                        "inputs": [
                            {
                                "internalType": "address",
                                "name": "_payer",
                                "type": "address"
                            },
                            {
                                "internalType": "address",
                                "name": "_payee",
                                "type": "address"
                            },
                            {
                                "internalType": "uint256",
                                "name": "_amount",
                                "type": "uint256"
                            }
                        ],
                        "name": "weixin",
                        "outputs": [],
                        "stateMutability": "payable",
                        "type": "function"
                    },
                    {
                        "inputs": [],
                        "name": "check_transaction",
                        "outputs": [
                            {
                                "internalType": "address",
                                "name": "",
                                "type": "address"
                            },
                            {
                                "internalType": "address",
                                "name": "",
                                "type": "address"
                            },
                            {
                                "internalType": "uint256",
                                "name": "",
                                "type": "uint256"
                            }
                        ],
                        "stateMutability": "view",
                        "type": "function"
                    }
                ]

            const web3 = new Web3(Web3.givenProvider);
            const contract = new web3.eth.Contract(contractABI, contractAddress);

            async function deposit(){
                const accounts = await web3.eth.requestAccounts();
                const payee = document.getElementById('recieverAddress').value;
                const amount = document.getElementById('amount').value;
                console.log(payee,amount);
                await contract.methods.deposit(payee,amount).send({from: accounts[0]});
            }

            async function transaction(){
                const result = await contract.methods.check_transaction().call();
                document.getElementById('view_payee').innerText = "Reciever is: " + result[1];
                document.getElementById('view_amount').innerText = "Amount is: " + result[2];
            }
        </script>
    </div>
</body>
