<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}">
</head>

<body>
    <div class="container" style="max-width: 640px;">
        <h2>User Manager</h2>
        <p>Use the deployed UserTransactionManager contract</p>
        <p>Main page user name: <strong id="mainUserName"></strong></p>

        <input type="text" id="contractAddress" value="0xcfb9af0dc66edcd62d9003c575922921d101313c" placeholder="Contract Address">
        <button class="btn" onclick="connectWalletAndSyncUser()">Connect Wallet & Sync User</button>
        <button class="btn" onclick="deleteUser()">Delete User</button>
        <button class="btn" onclick="getUser()">Get User</button>
        <button class="btn" onclick="getAllUsers()">Get All Users</button>

        <h2 style="font-size: 20px; margin-top: 24px;">Transaction</h2>
        <p>Transaction data is read from Transfer Money page.</p>
        <button class="btn" onclick="recordTransactionFromTransfer()">Record Last Transfer</button>
        <button class="btn" onclick="viewTransactions()">View User Transactions</button>

        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>

        <p id="result"></p>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
            const defaultContractAddress = "0xcfb9af0dc66edcd62d9003c575922921d101313c";
            const appUserName = {{ user_name|tojson }};
            const contractABI = [
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        },
                        {
                            "internalType": "string",
                            "name": "name",
                            "type": "string"
                        }
                    ],
                    "name": "addUser",
                    "outputs": [],
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        }
                    ],
                    "name": "deleteUser",
                    "outputs": [],
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        },
                        {
                            "internalType": "address",
                            "name": "from",
                            "type": "address"
                        },
                        {
                            "internalType": "address",
                            "name": "to",
                            "type": "address"
                        },
                        {
                            "internalType": "uint256",
                            "name": "amount",
                            "type": "uint256"
                        },
                        {
                            "internalType": "string",
                            "name": "action",
                            "type": "string"
                        }
                    ],
                    "name": "recordUserTransaction",
                    "outputs": [],
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        },
                        {
                            "internalType": "string",
                            "name": "name",
                            "type": "string"
                        }
                    ],
                    "name": "storeUser",
                    "outputs": [],
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "stateMutability": "nonpayable",
                    "type": "constructor"
                },
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        },
                        {
                            "indexed": false,
                            "internalType": "string",
                            "name": "name",
                            "type": "string"
                        }
                    ],
                    "name": "UserAdded",
                    "type": "event"
                },
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        }
                    ],
                    "name": "UserDeleted",
                    "type": "event"
                },
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        },
                        {
                            "indexed": false,
                            "internalType": "string",
                            "name": "name",
                            "type": "string"
                        }
                    ],
                    "name": "UserStored",
                    "type": "event"
                },
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        },
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "from",
                            "type": "address"
                        },
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "to",
                            "type": "address"
                        },
                        {
                            "indexed": false,
                            "internalType": "uint256",
                            "name": "amount",
                            "type": "uint256"
                        },
                        {
                            "indexed": false,
                            "internalType": "string",
                            "name": "action",
                            "type": "string"
                        },
                        {
                            "indexed": false,
                            "internalType": "uint256",
                            "name": "timestamp",
                            "type": "uint256"
                        }
                    ],
                    "name": "UserTransactionRecorded",
                    "type": "event"
                },
                {
                    "inputs": [],
                    "name": "getAllUsers",
                    "outputs": [
                        {
                            "internalType": "address[]",
                            "name": "",
                            "type": "address[]"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        }
                    ],
                    "name": "getUser",
                    "outputs": [
                        {
                            "internalType": "string",
                            "name": "name",
                            "type": "string"
                        },
                        {
                            "internalType": "bool",
                            "name": "exists",
                            "type": "bool"
                        },
                        {
                            "internalType": "uint256",
                            "name": "createdAt",
                            "type": "uint256"
                        },
                        {
                            "internalType": "uint256",
                            "name": "transactionCount",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        }
                    ],
                    "name": "getUserTransactionCount",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "owner",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "userAddress",
                            "type": "address"
                        }
                    ],
                    "name": "viewUserTransactions",
                    "outputs": [
                        {
                            "components": [
                                {
                                    "internalType": "address",
                                    "name": "from",
                                    "type": "address"
                                },
                                {
                                    "internalType": "address",
                                    "name": "to",
                                    "type": "address"
                                },
                                {
                                    "internalType": "uint256",
                                    "name": "amount",
                                    "type": "uint256"
                                },
                                {
                                    "internalType": "uint256",
                                    "name": "timestamp",
                                    "type": "uint256"
                                },
                                {
                                    "internalType": "string",
                                    "name": "action",
                                    "type": "string"
                                }
                            ],
                            "internalType": "struct UserTransactionManager.UserTransaction[]",
                            "name": "",
                            "type": "tuple[]"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                }
            ];

            function getContract() {
                const contractAddress = document.getElementById("contractAddress").value.trim();
                if (!contractAddress) {
                    throw new Error("Please input contract address");
                }
                if (!window.ethereum) {
                    throw new Error("Wallet not found. Please install MetaMask.");
                }
                const web3 = new Web3(Web3.givenProvider);
                return { web3, contract: new web3.eth.Contract(contractABI, contractAddress) };
            }

            document.getElementById("contractAddress").value = defaultContractAddress;
            document.getElementById("mainUserName").innerText = appUserName || "Not set";

            function setResult(message) {
                document.getElementById("result").innerText = message;
            }

            let connectedAccount = null;

            function ensureConnectedAccount() {
                if (!connectedAccount) {
                    throw new Error("Please connect wallet first");
                }
            }

            async function connectWalletAndSyncUser() {
                try {
                    const { web3, contract } = getContract();
                    const accounts = await web3.eth.requestAccounts();
                    connectedAccount = accounts[0];

                    if (!appUserName) {
                        throw new Error("No user name found. Enter user name from main page first.");
                    }

                    await contract.methods.storeUser(connectedAccount, appUserName).send({ from: connectedAccount });
                    setResult("Wallet connected and user profile stored/updated");
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function deleteUser() {
                try {
                    ensureConnectedAccount();
                    const { contract } = getContract();
                    await contract.methods.deleteUser(connectedAccount).send({ from: connectedAccount });
                    setResult("User deleted successfully");
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function getUser() {
                try {
                    ensureConnectedAccount();
                    const { contract } = getContract();
                    const result = await contract.methods.getUser(connectedAccount).call();
                    setResult(
                        "Name: " + result.name +
                        " | Exists: " + result.exists +
                        " | CreatedAt: " + result.createdAt +
                        " | TxCount: " + result.transactionCount
                    );
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function getAllUsers() {
                try {
                    const { contract } = getContract();
                    const result = await contract.methods.getAllUsers().call();
                    setResult("All users: " + JSON.stringify(result));
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function recordTransactionFromTransfer() {
                try {
                    ensureConnectedAccount();
                    const { contract } = getContract();
                    const transferDataRaw = localStorage.getItem("latestTransferTx");

                    if (!transferDataRaw) {
                        throw new Error("No transfer data found. Make a transfer on Transfer Money page first.");
                    }

                    const transferData = JSON.parse(transferDataRaw);
                    if (!transferData.from || !transferData.to || !transferData.amount) {
                        throw new Error("Transfer data is incomplete. Please perform transfer again.");
                    }

                    await contract.methods.recordUserTransaction(
                        connectedAccount,
                        transferData.from,
                        transferData.to,
                        transferData.amount,
                        transferData.action || "transfer"
                    ).send({ from: connectedAccount });

                    setResult("Last transfer recorded successfully");
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function viewTransactions() {
                try {
                    ensureConnectedAccount();
                    const { contract } = getContract();
                    const result = await contract.methods.viewUserTransactions(connectedAccount).call();
                    setResult("Transactions: " + JSON.stringify(result));
                } catch (err) {
                    setResult(err.message);
                }
            }
        </script>
    </div>
</body>
