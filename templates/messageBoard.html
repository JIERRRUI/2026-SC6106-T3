<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='styles.css')}}">
</head>

<body>
    <div class="container" style="max-width: 720px;">
        <h2>Message Board</h2>
        <p>Connect wallet and store messages on blockchain</p>

        <input type="text" id="contractAddress" value="0x5bd27177d3c407066545b2ec79960dc8a8c27f38" placeholder="MessageBoard Contract Address">
        <button class="btn" onclick="connectWallet()">Connect Wallet</button>
        <p id="walletStatus">Wallet: Not connected</p>

        <textarea id="messageContent" placeholder="Type your message" style="width: 100%; min-height: 100px; margin-top: 10px; border-radius: 4px; border: 1px solid #ddd; padding: 10px; font-size: 16px;"></textarea>
        <button class="btn" onclick="storeMessage()">Store Message</button>

        <input type="number" id="messageIndex" placeholder="Message Index (0-based)">
        <button class="btn" onclick="getMessageByIndex()">Get Message By Index</button>
        <button class="btn" onclick="getLatestMessage()">Get Latest Message</button>
        <button class="btn" onclick="getMessageCount()">Get Message Count</button>
        <button class="btn" onclick="getAllMessages()">Get All Messages</button>

        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>

        <p id="result"></p>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
            const defaultContractAddress = "0x5bd27177d3c407066545b2ec79960dc8a8c27f38";
            const messageBoardABI = [
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "sender",
                            "type": "address"
                        },
                        {
                            "indexed": false,
                            "internalType": "string",
                            "name": "content",
                            "type": "string"
                        },
                        {
                            "indexed": false,
                            "internalType": "uint256",
                            "name": "timestamp",
                            "type": "uint256"
                        }
                    ],
                    "name": "MessageStored",
                    "type": "event"
                },
                {
                    "inputs": [
                        {
                            "internalType": "string",
                            "name": "content",
                            "type": "string"
                        }
                    ],
                    "name": "storeMessage",
                    "outputs": [],
                    "stateMutability": "nonpayable",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "getAllMessages",
                    "outputs": [
                        {
                            "components": [
                                {
                                    "internalType": "address",
                                    "name": "sender",
                                    "type": "address"
                                },
                                {
                                    "internalType": "string",
                                    "name": "content",
                                    "type": "string"
                                },
                                {
                                    "internalType": "uint256",
                                    "name": "timestamp",
                                    "type": "uint256"
                                }
                            ],
                            "internalType": "struct MessageBoard.Message[]",
                            "name": "",
                            "type": "tuple[]"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "getLatestMessage",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "sender",
                            "type": "address"
                        },
                        {
                            "internalType": "string",
                            "name": "content",
                            "type": "string"
                        },
                        {
                            "internalType": "uint256",
                            "name": "timestamp",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "uint256",
                            "name": "index",
                            "type": "uint256"
                        }
                    ],
                    "name": "getMessageByIndex",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "sender",
                            "type": "address"
                        },
                        {
                            "internalType": "string",
                            "name": "content",
                            "type": "string"
                        },
                        {
                            "internalType": "uint256",
                            "name": "timestamp",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "getMessageCount",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                }
            ];

            let web3;
            let connectedAccount = null;

            function setResult(message) {
                document.getElementById("result").innerText = message;
            }

            function getContract() {
                const contractAddress = document.getElementById("contractAddress").value.trim();
                if (!contractAddress) {
                    throw new Error("Please input contract address");
                }
                return new web3.eth.Contract(messageBoardABI, contractAddress);
            }

            document.getElementById("contractAddress").value = defaultContractAddress;

            async function connectWallet() {
                try {
                    if (!window.ethereum) {
                        throw new Error("Wallet not found. Please install MetaMask.");
                    }
                    web3 = new Web3(Web3.givenProvider);
                    const accounts = await web3.eth.requestAccounts();
                    connectedAccount = accounts[0];
                    document.getElementById("walletStatus").innerText = "Wallet: " + connectedAccount;
                    setResult("Wallet connected");
                } catch (err) {
                    setResult(err.message);
                }
            }

            function requireWalletConnection() {
                if (!web3 || !connectedAccount) {
                    throw new Error("Please connect wallet first");
                }
            }

            async function storeMessage() {
                try {
                    requireWalletConnection();
                    const contract = getContract();
                    const content = document.getElementById("messageContent").value;
                    await contract.methods.storeMessage(content).send({ from: connectedAccount });
                    setResult("Message stored on blockchain");
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function getMessageByIndex() {
                try {
                    requireWalletConnection();
                    const contract = getContract();
                    const index = document.getElementById("messageIndex").value;
                    const result = await contract.methods.getMessageByIndex(index).call();
                    setResult("Sender: " + result.sender + " | Message: " + result.content + " | Timestamp: " + result.timestamp);
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function getLatestMessage() {
                try {
                    requireWalletConnection();
                    const contract = getContract();
                    const result = await contract.methods.getLatestMessage().call();
                    setResult("Latest -> Sender: " + result.sender + " | Message: " + result.content + " | Timestamp: " + result.timestamp);
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function getMessageCount() {
                try {
                    requireWalletConnection();
                    const contract = getContract();
                    const result = await contract.methods.getMessageCount().call();
                    setResult("Total messages: " + result);
                } catch (err) {
                    setResult(err.message);
                }
            }

            async function getAllMessages() {
                try {
                    requireWalletConnection();
                    const contract = getContract();
                    const result = await contract.methods.getAllMessages().call();
                    setResult("All messages: " + JSON.stringify(result));
                } catch (err) {
                    setResult(err.message);
                }
            }
        </script>
    </div>
</body>
